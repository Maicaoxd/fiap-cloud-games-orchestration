apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: fiap-cloud-games
  labels:
    app: rabbitmq
spec:
  type: ClusterIP
  selector:
    app: rabbitmq
  ports:
    - name: amqp
      port: 5672
      targetPort: amqp
    - name: management
      port: 15672
      targetPort: management
