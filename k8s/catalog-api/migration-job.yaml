apiVersion: batch/v1
kind: Job
metadata:
  name: catalog-api-migration
  namespace: fiap-cloud-games
  labels:
    app: catalog-api
    job: catalog-api-migration
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 300
  template:
    metadata:
      labels:
        app: catalog-api
        job: catalog-api-migration
    spec:
      restartPolicy: Never
      containers:
        - name: catalog-api-migration
          image: maicaoxd/fiap-cloud-games-catalog-api:0.1.0
          imagePullPolicy: IfNotPresent
          command: ["dotnet", "CatalogAPI.dll", "--migrate"]
          envFrom:
            - configMapRef:
                name: catalog-api-configmap
            - secretRef:
                name: catalog-api-secret
