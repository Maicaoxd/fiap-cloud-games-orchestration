services:
  rabbitmq:
    image: rabbitmq:3-management
    hostname: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: "guest"
      RABBITMQ_DEFAULT_PASS: "guest"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - fcg-network

  users-sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Fcg@123456"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - users-sqlserver-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -C -Q \"SELECT 1\" || /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -Q \"SELECT 1\""]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    networks:
      - fcg-network

  users-api:
    build:
      context: ../fiap-cloud-games-users-api
      dockerfile: Dockerfile
    ports:
      - "5001:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__DefaultConnection: "Server=users-sqlserver,1433;Database=FiapCloudGamesUsers;User Id=sa;Password=Fcg@123456;TrustServerCertificate=True;Encrypt=False"
      RabbitMq__Host: "rabbitmq"
      RabbitMq__Port: "5672"
      RabbitMq__VirtualHost: "/"
      RabbitMq__Username: "guest"
      RabbitMq__Password: "guest"
    depends_on:
      users-sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - fcg-network

  notifications-api:
    build:
      context: ../fiap-cloud-games-notifications-api
      dockerfile: Dockerfile
    ports:
      - "5002:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ASPNETCORE_URLS: "http://+:8080"
      RabbitMq__Host: "rabbitmq"
      RabbitMq__Port: "5672"
      RabbitMq__VirtualHost: "/"
      RabbitMq__Username: "guest"
      RabbitMq__Password: "guest"
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - fcg-network

volumes:
  users-sqlserver-data:

networks:
  fcg-network:
    driver: bridge

